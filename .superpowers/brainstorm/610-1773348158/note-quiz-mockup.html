<h2>Noten-Quiz: Rundenablauf</h2>
<p class="subtitle">So sieht eine Runde aus (10 Noten, Notenblatt-Anzeige)</p>

<div class="split">
  <div class="mockup">
    <div class="mockup-header">Quiz-Screen</div>
    <div class="mockup-body" style="background:#121212; color:#e0e0e0; padding:24px; text-align:center;">
      <!-- Progress bar -->
      <div style="margin-bottom:20px;">
        <div style="display:flex; justify-content:space-between; font-size:12px; color:#9e9e9e; margin-bottom:4px;">
          <span>Runde 1</span>
          <span>3 / 10</span>
        </div>
        <div style="background:#333; border-radius:8px; height:8px; overflow:hidden;">
          <div style="background:#4CAF50; width:30%; height:100%; border-radius:8px;"></div>
        </div>
      </div>

      <!-- Staff notation -->
      <div style="background:#1a1a2e; border-radius:12px; padding:24px; margin:16px 0;">
        <svg viewBox="0 0 200 120" style="width:100%; max-width:300px;">
          <!-- Staff lines -->
          <line x1="20" y1="30" x2="180" y2="30" stroke="#555" stroke-width="1"/>
          <line x1="20" y1="42" x2="180" y2="42" stroke="#555" stroke-width="1"/>
          <line x1="20" y1="54" x2="180" y2="54" stroke="#555" stroke-width="1"/>
          <line x1="20" y1="66" x2="180" y2="66" stroke="#555" stroke-width="1"/>
          <line x1="20" y1="78" x2="180" y2="78" stroke="#555" stroke-width="1"/>
          <!-- Treble clef (simplified) -->
          <text x="25" y="65" font-size="40" fill="#9e9e9e" font-family="serif">&#119070;</text>
          <!-- Note (whole note on D line) -->
          <ellipse cx="120" cy="72" rx="10" ry="7" fill="#4CAF50" stroke="#4CAF50" stroke-width="1"/>
          <!-- Stem -->
          <line x1="130" y1="72" x2="130" y2="35" stroke="#4CAF50" stroke-width="2"/>
        </svg>
      </div>

      <!-- Listening indicator -->
      <div style="margin:16px 0;">
        <div style="display:inline-flex; align-items:center; gap:8px; color:#4CAF50; font-size:14px;">
          <div style="width:10px; height:10px; background:#4CAF50; border-radius:50%; animation:pulse 1.5s infinite;"></div>
          Lausche...
        </div>
      </div>

      <!-- Detected note display -->
      <div style="font-size:48px; font-weight:bold; color:#9e9e9e; margin:8px 0;">
        --
      </div>
      <div style="font-size:14px; color:#666;">Spiele die angezeigte Note</div>
    </div>
  </div>

  <div class="mockup">
    <div class="mockup-header">Ergebnis-Screen</div>
    <div class="mockup-body" style="background:#121212; color:#e0e0e0; padding:24px; text-align:center;">
      <!-- Score circle -->
      <div style="margin:20px 0;">
        <div style="width:120px; height:120px; border-radius:50%; border:6px solid #4CAF50; display:inline-flex; align-items:center; justify-content:center; flex-direction:column;">
          <div style="font-size:36px; font-weight:bold; color:#4CAF50;">8</div>
          <div style="font-size:14px; color:#9e9e9e;">von 10</div>
        </div>
      </div>

      <div style="font-size:24px; font-weight:bold; margin:12px 0; color:#4CAF50;">Super!</div>

      <!-- Stats -->
      <div style="display:flex; justify-content:space-around; margin:24px 0; padding:16px; background:#1E1E1E; border-radius:12px;">
        <div>
          <div style="font-size:20px; font-weight:bold;">80%</div>
          <div style="font-size:11px; color:#9e9e9e;">Genauigkeit</div>
        </div>
        <div>
          <div style="font-size:20px; font-weight:bold;">2.1s</div>
          <div style="font-size:11px; color:#9e9e9e;">Durchschnitt</div>
        </div>
        <div>
          <div style="font-size:20px; font-weight:bold;">5</div>
          <div style="font-size:11px; color:#9e9e9e;">Beste Serie</div>
        </div>
      </div>

      <!-- Note breakdown -->
      <div style="text-align:left; padding:12px; background:#1E1E1E; border-radius:12px; margin:12px 0;">
        <div style="font-size:12px; color:#9e9e9e; margin-bottom:8px;">DETAIL</div>
        <div style="display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid #333;">
          <span>E2</span><span style="color:#4CAF50;">&#10003;</span>
        </div>
        <div style="display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid #333;">
          <span>A2</span><span style="color:#4CAF50;">&#10003;</span>
        </div>
        <div style="display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid #333;">
          <span>D3</span><span style="color:#F44336;">&#10007; (spielte D#3)</span>
        </div>
        <div style="display:flex; justify-content:space-between; padding:4px 0;">
          <span>G3</span><span style="color:#4CAF50;">&#10003;</span>
        </div>
      </div>

      <!-- Buttons -->
      <div style="display:flex; gap:12px; margin-top:20px;">
        <button style="flex:1; padding:14px; background:#1E1E1E; color:#e0e0e0; border:1px solid #333; border-radius:8px; font-size:16px; cursor:pointer;">Zurueck</button>
        <button style="flex:1; padding:14px; background:#4CAF50; color:white; border:none; border-radius:8px; font-size:16px; cursor:pointer;">Nochmal</button>
      </div>
    </div>
  </div>
</div>

<style>
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
</style>
